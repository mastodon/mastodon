---
LOCAL_DOMAIN:
  type: string
  group: federation
  description: The domain name of the server. This is the identifier used in ActivityPub
    and cannot be changed after initial setup without breaking federation.
  examples:
  - mastodon.example.com
WEB_DOMAIN:
  type: string
  group: federation
  description: Override the domain used to construct public URLs. Useful when the
    ActivityPub domain differs from the HTTP hostname (e.g. you serve Mastodon from
    a sub-path). Defaults to LOCAL_DOMAIN.
  examples:
  - social.example.com
ALTERNATE_DOMAINS:
  type: string
  group: federation
  description: Comma-separated list of additional domain names that the server accepts
    HTTP Host headers for.
  default: ''
STREAMING_API_BASE_URL:
  type: string
  group: federation
  description: Base URL for the streaming API (WebSocket). Computed automatically
    from WEB_DOMAIN / LOCAL_DOMAIN when absent.
  examples:
  - wss://streaming.example.com
LIMITED_FEDERATION_MODE:
  type: boolean
  group: federation
  description: Restrict federation to explicitly allowed servers only.
  default: false
SINGLE_USER_MODE:
  type: boolean
  group: federation
  description: Disable registrations and redirect the landing page to the admin account
    profile.
  default: false
SELF_DESTRUCT:
  type: string
  group: federation
  description: 'When set, puts the instance into self-destruct mode: all local content
    is removed and federation partners are notified. The value must match a token
    generated by the CLI. Cannot be undone.'
EXPERIMENTAL_FEATURES:
  type: string
  group: federation
  description: Space-separated list of opt-in experimental feature flags to enable.
UPDATE_CHECK_URL:
  type: string
  group: federation
  description: URL polled to check for new Mastodon releases. Set to an empty string
    to disable update checks.
  default: https://api.joinmastodon.org/update-check
  format: uri
DONATION_CAMPAIGNS_URL:
  type: string
  group: federation
  description: URL of the donation campaigns API. When set, Mastodon may display fundraising
    notices to admins.
  format: uri
DONATION_CAMPAIGNS_ENVIRONMENT:
  type: string
  group: federation
  description: Environment tag sent with donation-campaign API requests.
SOURCE_TAG:
  type: string
  group: federation
  description: Git tag of the running source code. Shown in the about page and version
    API.
SOURCE_BASE_URL:
  type: string
  group: federation
  description: Base URL of the source code repository. Used to construct links on
    the about page.
  format: uri
GITHUB_REPOSITORY:
  type: string
  group: federation
  description: GitHub repository identifier used to construct source code links.
  default: mastodon/mastodon
SOURCE_COMMIT:
  type: string
  group: federation
  description: Git commit SHA of the running source code. Shown in the version API.
MASTODON_VERSION_PRERELEASE:
  type: string
  group: federation
  description: Prerelease suffix appended to the Mastodon version string (e.g. "beta.1").
MASTODON_VERSION_METADATA:
  type: string
  group: federation
  description: Build metadata appended to the Mastodon version string (e.g. a commit
    SHA).
DB_HOST:
  type: string
  group: database
  description: PostgreSQL server hostname or Unix-socket directory.
  default: "/var/run/postgresql"
DB_PORT:
  type: integer
  group: database
  description: PostgreSQL server port.
  default: 5432
  minimum: 1
  maximum: 65535
DB_NAME:
  type: string
  group: database
  description: PostgreSQL database name.
  default: mastodon_production
DB_USER:
  type: string
  group: database
  description: PostgreSQL role name used to connect.
DB_PASS:
  type: string
  group: database
  description: PostgreSQL password.
  default: ''
  secret: true
DB_POOL:
  type: integer
  group: database
  description: Maximum number of database connections per process. Defaults to Sidekiq
    concurrency or MAX_THREADS.
DB_SSLMODE:
  type: string
  group: database
  description: PostgreSQL SSL mode.
  default: prefer
  enum:
  - disable
  - allow
  - prefer
  - require
  - verify-ca
  - verify-full
PREPARED_STATEMENTS:
  type: boolean
  group: database
  description: Use prepared statements. Disable when using a connection pooler such
    as PgBouncer in transaction mode.
  default: true
REPLICA_DB_HOST:
  type: string
  group: database
  description: Read-replica PostgreSQL hostname. Falls back to DB_HOST.
REPLICA_DB_PORT:
  type: integer
  group: database
  description: Read-replica PostgreSQL port.
  minimum: 1
  maximum: 65535
REPLICA_DB_NAME:
  type: string
  group: database
  description: Read-replica database name. Falls back to DB_NAME.
REPLICA_DB_USER:
  type: string
  group: database
  description: Read-replica role name. Falls back to DB_USER.
REPLICA_DB_PASS:
  type: string
  group: database
  description: Read-replica password. Falls back to DB_PASS.
  secret: true
REPLICA_PREPARED_STATEMENTS:
  type: boolean
  group: database
  description: Use prepared statements on the read replica. Falls back to PREPARED_STATEMENTS.
REPLICA_DB_TASKS:
  type: boolean
  group: database
  description: Run database schema tasks (e.g. db:schema:load) against the read replica
    as well as the primary.
  default: true
REDIS_URL:
  type: string
  group: redis
  description: 'Main Redis: full connection URL. When set, all other REDIS_* options
    are ignored.'
  examples:
  - redis://localhost:6379/0
  - rediss://user:pass@redis.example.com:6380/1
REDIS_HOST:
  type: string
  group: redis
  description: 'Main Redis: hostname.'
  default: localhost
REDIS_PORT:
  type: integer
  group: redis
  description: 'Main Redis: port.'
  default: 6379
  minimum: 1
  maximum: 65535
REDIS_DB:
  type: integer
  group: redis
  description: 'Main Redis: database number.'
  default: 0
  minimum: 0
REDIS_USER:
  type: string
  group: redis
  description: 'Main Redis: username (Redis 6+ ACL).'
REDIS_PASSWORD:
  type: string
  group: redis
  description: 'Main Redis: password.'
  secret: true
REDIS_SENTINEL_MASTER:
  type: string
  group: redis
  description: 'Main Redis: Sentinel master name. Required to enable Sentinel mode.'
REDIS_SENTINELS:
  type: string
  group: redis
  description: 'Main Redis: comma-separated list of Sentinel addresses (host:port).'
  examples:
  - sentinel1:26379,sentinel2:26379
REDIS_SENTINEL_PORT:
  type: integer
  group: redis
  description: 'Main Redis: default port for Sentinel nodes listed in REDIS_SENTINELS.'
  default: 26379
REDIS_SENTINEL_USERNAME:
  type: string
  group: redis
  description: 'Main Redis: username for authenticating with Sentinels.'
REDIS_SENTINEL_PASSWORD:
  type: string
  group: redis
  description: 'Main Redis: password for authenticating with Sentinels.'
  secret: true
SIDEKIQ_REDIS_URL:
  type: string
  group: redis
  description: 'Sidekiq Redis: full connection URL. When set, all other SIDEKIQ_REDIS_*
    options are ignored.'
  examples:
  - redis://localhost:6379/0
  - rediss://user:pass@redis.example.com:6380/1
SIDEKIQ_REDIS_HOST:
  type: string
  group: redis
  description: 'Sidekiq Redis: hostname.'
  default: localhost
SIDEKIQ_REDIS_PORT:
  type: integer
  group: redis
  description: 'Sidekiq Redis: port.'
  default: 6379
  minimum: 1
  maximum: 65535
SIDEKIQ_REDIS_DB:
  type: integer
  group: redis
  description: 'Sidekiq Redis: database number.'
  default: 0
  minimum: 0
SIDEKIQ_REDIS_USER:
  type: string
  group: redis
  description: 'Sidekiq Redis: username (Redis 6+ ACL).'
SIDEKIQ_REDIS_PASSWORD:
  type: string
  group: redis
  description: 'Sidekiq Redis: password.'
  secret: true
SIDEKIQ_REDIS_SENTINEL_MASTER:
  type: string
  group: redis
  description: 'Sidekiq Redis: Sentinel master name. Required to enable Sentinel mode.'
SIDEKIQ_REDIS_SENTINELS:
  type: string
  group: redis
  description: 'Sidekiq Redis: comma-separated list of Sentinel addresses (host:port).'
  examples:
  - sentinel1:26379,sentinel2:26379
SIDEKIQ_REDIS_SENTINEL_PORT:
  type: integer
  group: redis
  description: 'Sidekiq Redis: default port for Sentinel nodes listed in SIDEKIQ_REDIS_SENTINELS.'
  default: 26379
SIDEKIQ_REDIS_SENTINEL_USERNAME:
  type: string
  group: redis
  description: 'Sidekiq Redis: username for authenticating with Sentinels.'
SIDEKIQ_REDIS_SENTINEL_PASSWORD:
  type: string
  group: redis
  description: 'Sidekiq Redis: password for authenticating with Sentinels.'
  secret: true
CACHE_REDIS_URL:
  type: string
  group: redis
  description: 'Cache Redis: full connection URL. When set, all other CACHE_REDIS_*
    options are ignored.'
  examples:
  - redis://localhost:6379/0
  - rediss://user:pass@redis.example.com:6380/1
CACHE_REDIS_HOST:
  type: string
  group: redis
  description: 'Cache Redis: hostname.'
  default: localhost
CACHE_REDIS_PORT:
  type: integer
  group: redis
  description: 'Cache Redis: port.'
  default: 6379
  minimum: 1
  maximum: 65535
CACHE_REDIS_DB:
  type: integer
  group: redis
  description: 'Cache Redis: database number.'
  default: 0
  minimum: 0
CACHE_REDIS_USER:
  type: string
  group: redis
  description: 'Cache Redis: username (Redis 6+ ACL).'
CACHE_REDIS_PASSWORD:
  type: string
  group: redis
  description: 'Cache Redis: password.'
  secret: true
CACHE_REDIS_SENTINEL_MASTER:
  type: string
  group: redis
  description: 'Cache Redis: Sentinel master name. Required to enable Sentinel mode.'
CACHE_REDIS_SENTINELS:
  type: string
  group: redis
  description: 'Cache Redis: comma-separated list of Sentinel addresses (host:port).'
  examples:
  - sentinel1:26379,sentinel2:26379
CACHE_REDIS_SENTINEL_PORT:
  type: integer
  group: redis
  description: 'Cache Redis: default port for Sentinel nodes listed in CACHE_REDIS_SENTINELS.'
  default: 26379
CACHE_REDIS_SENTINEL_USERNAME:
  type: string
  group: redis
  description: 'Cache Redis: username for authenticating with Sentinels.'
CACHE_REDIS_SENTINEL_PASSWORD:
  type: string
  group: redis
  description: 'Cache Redis: password for authenticating with Sentinels.'
  secret: true
REDIS_DRIVER:
  type: string
  group: redis
  description: Redis client driver. "hiredis" is faster; "ruby" is a pure-Ruby fallback.
  default: hiredis
  enum:
  - hiredis
  - ruby
SMTP_SERVER:
  type: string
  group: email
  description: 'SMTP: server hostname.'
SMTP_PORT:
  type: integer
  group: email
  description: 'SMTP: server port.'
  default: 587
  minimum: 1
  maximum: 65535
SMTP_LOGIN:
  type: string
  group: email
  description: 'SMTP: authentication username.'
SMTP_PASSWORD:
  type: string
  group: email
  description: 'SMTP: authentication password.'
  secret: true
SMTP_FROM_ADDRESS:
  type: string
  group: email
  description: 'SMTP: envelope / From address.'
  default: notifications@localhost
  format: email
SMTP_DOMAIN:
  type: string
  group: email
  description: 'SMTP: HELO domain. Defaults to LOCAL_DOMAIN.'
SMTP_AUTH_METHOD:
  type: string
  group: email
  description: 'SMTP: SASL authentication method.'
  default: plain
  enum:
  - plain
  - login
  - cram_md5
  - none
SMTP_ENABLE_STARTTLS:
  type: string
  group: email
  description: 'SMTP: STARTTLS mode.'
  enum: &1
  - auto
  - always
  - never
SMTP_TLS:
  type: boolean
  group: email
  description: 'SMTP: use implicit TLS (port 465 style).'
  default: false
SMTP_SSL:
  type: boolean
  group: email
  description: 'SMTP: alias for SMTP_TLS.'
  default: false
SMTP_CA_FILE:
  type: string
  group: email
  description: 'SMTP: path to the CA bundle used to verify the server certificate.'
  default: "/etc/ssl/certs/ca-certificates.crt"
SMTP_OPENSSL_VERIFY_MODE:
  type: string
  group: email
  description: 'SMTP: OpenSSL peer verification mode.'
  enum:
  - none
  - peer
  - client_once
  - fail_if_no_peer_cert
BULK_SMTP_SERVER:
  type: string
  group: email
  description: 'Bulk SMTP: server hostname.'
BULK_SMTP_PORT:
  type: integer
  group: email
  description: 'Bulk SMTP: server port.'
  default: 587
  minimum: 1
  maximum: 65535
BULK_SMTP_LOGIN:
  type: string
  group: email
  description: 'Bulk SMTP: authentication username.'
BULK_SMTP_PASSWORD:
  type: string
  group: email
  description: 'Bulk SMTP: authentication password.'
  secret: true
BULK_SMTP_DOMAIN:
  type: string
  group: email
  description: 'Bulk SMTP: HELO domain. Defaults to LOCAL_DOMAIN.'
BULK_SMTP_AUTH_METHOD:
  type: string
  group: email
  description: 'Bulk SMTP: SASL authentication method.'
  default: plain
  enum:
  - plain
  - login
  - cram_md5
  - none
BULK_SMTP_ENABLE_STARTTLS:
  type: string
  group: email
  description: 'Bulk SMTP: STARTTLS mode.'
  enum: *1
BULK_SMTP_TLS:
  type: boolean
  group: email
  description: 'Bulk SMTP: use implicit TLS (port 465 style).'
  default: false
BULK_SMTP_SSL:
  type: boolean
  group: email
  description: 'Bulk SMTP: alias for BULK_SMTP_TLS.'
  default: false
BULK_SMTP_CA_FILE:
  type: string
  group: email
  description: 'Bulk SMTP: path to the CA bundle used to verify the server certificate.'
  default: "/etc/ssl/certs/ca-certificates.crt"
BULK_SMTP_OPENSSL_VERIFY_MODE:
  type: string
  group: email
  description: 'Bulk SMTP: OpenSSL peer verification mode.'
  enum:
  - none
  - peer
  - client_once
  - fail_if_no_peer_cert
SMTP_REPLY_TO:
  type: string
  group: email
  description: 'SMTP: Reply-To address.'
  format: email
SMTP_RETURN_PATH:
  type: string
  group: email
  description: 'SMTP: Return-Path address.'
  format: email
SMTP_DELIVERY_METHOD:
  type: string
  group: email
  description: Mail delivery method.
  default: smtp
  enum:
  - smtp
  - sendmail
  - letter_opener
  - test
SMTP_ENABLE_STARTTLS_AUTO:
  type: boolean
  group: email
  description: 'SMTP: automatically negotiate STARTTLS if the server advertises it.
    Superseded by SMTP_ENABLE_STARTTLS when that is set.'
  default: true
BULK_SMTP_ENABLE_STARTTLS_AUTO:
  type: boolean
  group: email
  description: 'Bulk SMTP: automatically negotiate STARTTLS if the server advertises
    it. Superseded by BULK_SMTP_ENABLE_STARTTLS when that is set.'
  default: true
S3_ENABLED:
  type: boolean
  group: storage
  description: Use S3-compatible object storage for media files.
  default: false
S3_BUCKET:
  type: string
  group: storage
  description: S3 bucket name.
S3_REGION:
  type: string
  group: storage
  description: S3 region.
  default: us-east-1
S3_ENDPOINT:
  type: string
  group: storage
  description: Override the S3 endpoint URL. Required for non-AWS providers such as
    MinIO, Wasabi, or Backblaze B2.
  examples:
  - https://s3.example.com
S3_HOSTNAME:
  type: string
  group: storage
  description: Hostname used to construct public S3 URLs when no alias is set.
S3_ALIAS_HOST:
  type: string
  group: storage
  description: Custom hostname (CDN / proxy) used for public media URLs, replacing
    the default S3 hostname.
S3_CLOUDFRONT_HOST:
  type: string
  group: storage
  description: Alias for S3_ALIAS_HOST, kept for backwards compatibility.
S3_KEY_PREFIX:
  type: string
  group: storage
  description: Prefix prepended to all S3 object keys.
S3_PERMISSION:
  type: string
  group: storage
  description: Canned ACL applied to uploaded objects.
  default: public-read
  enum:
  - private
  - public-read
  - authenticated-read
S3_PROTOCOL:
  type: string
  group: storage
  description: Protocol used when constructing S3 URLs.
  default: https
  enum:
  - http
  - https
S3_SIGNATURE_VERSION:
  type: string
  group: storage
  description: S3 request signing version.
  default: v4
  enum:
  - v2
  - v4
S3_OVERRIDE_PATH_STYLE:
  type: boolean
  group: storage
  description: Force path-style S3 URLs (required for some non-AWS providers).
  default: false
S3_OPEN_TIMEOUT:
  type: integer
  group: storage
  description: S3 connection open timeout in seconds.
  default: 5
S3_READ_TIMEOUT:
  type: integer
  group: storage
  description: S3 read timeout in seconds.
  default: 5
S3_RETRY_LIMIT:
  type: integer
  group: storage
  description: Number of times to retry failed S3 requests.
  default: 0
S3_STORAGE_CLASS:
  type: string
  group: storage
  description: S3 storage class for uploaded objects.
  enum:
  - STANDARD
  - REDUCED_REDUNDANCY
  - STANDARD_IA
  - ONEZONE_IA
  - INTELLIGENT_TIERING
  - GLACIER
  - DEEP_ARCHIVE
S3_MULTIPART_THRESHOLD:
  type: integer
  group: storage
  description: File size in bytes above which S3 uploads switch to multipart mode.
  default: 15728640
S3_FORCE_SINGLE_REQUEST:
  type: boolean
  group: storage
  description: Disable multipart uploads and always use a single PUT request.
  default: false
S3_ENABLE_CHECKSUM_MODE:
  type: boolean
  group: storage
  description: Enable S3 checksum mode on object retrieval.
  default: false
AWS_ACCESS_KEY_ID:
  type: string
  group: storage
  description: AWS / S3-compatible access key ID.
  secret: true
AWS_SECRET_ACCESS_KEY:
  type: string
  group: storage
  description: AWS / S3-compatible secret access key.
  secret: true
PAPERCLIP_ROOT_PATH:
  type: string
  group: storage
  description: Filesystem path where media attachments are stored when using local
    storage.
  default: public/system
PAPERCLIP_ROOT_URL:
  type: string
  group: storage
  description: URL prefix for locally-stored media attachments.
  default: "/system"
EXTRA_MEDIA_HOSTS:
  type: string
  group: storage
  description: Comma-separated list of additional hostnames allowed to serve media
    (added to the Content-Security-Policy).
  default: ''
SWIFT_ENABLED:
  type: boolean
  group: storage
  description: Use OpenStack Swift object storage.
  default: false
SWIFT_USERNAME:
  type: string
  group: storage
  description: Swift username.
SWIFT_PASSWORD:
  type: string
  group: storage
  description: Swift password.
  secret: true
SWIFT_PROJECT_ID:
  type: string
  group: storage
  description: Swift project / tenant ID.
SWIFT_TENANT:
  type: string
  group: storage
  description: Swift tenant name (v2 auth).
SWIFT_AUTH_URL:
  type: string
  group: storage
  description: Keystone authentication endpoint.
SWIFT_REGION:
  type: string
  group: storage
  description: Swift region.
SWIFT_DOMAIN_NAME:
  type: string
  group: storage
  description: Swift domain name (v3 auth).
  default: default
SWIFT_CONTAINER:
  type: string
  group: storage
  description: Swift container name.
SWIFT_OBJECT_URL:
  type: string
  group: storage
  description: Public URL prefix for Swift objects.
SWIFT_TEMP_URL_KEY:
  type: string
  group: storage
  description: Swift temporary URL signing key.
  secret: true
SWIFT_CACHE_TTL:
  type: integer
  group: storage
  description: Swift metadata cache TTL in seconds.
  default: 60
AZURE_ENABLED:
  type: boolean
  group: storage
  description: Use Azure Blob Storage.
  default: false
AZURE_STORAGE_ACCOUNT:
  type: string
  group: storage
  description: Azure storage account name.
AZURE_STORAGE_ACCESS_KEY:
  type: string
  group: storage
  description: Azure storage account access key.
  secret: true
AZURE_CONTAINER_NAME:
  type: string
  group: storage
  description: Azure blob container name.
AZURE_ALIAS_HOST:
  type: string
  group: storage
  description: Custom hostname for public Azure media URLs.
ES_ENABLED:
  type: boolean
  group: search
  description: Enable Elasticsearch / OpenSearch for full-text search.
  default: false
ES_HOST:
  type: string
  group: search
  description: Elasticsearch hostname.
  default: localhost
ES_PORT:
  type: integer
  group: search
  description: Elasticsearch port.
  default: 9200
  minimum: 1
  maximum: 65535
ES_USER:
  type: string
  group: search
  description: Elasticsearch username (HTTP Basic auth).
ES_PASS:
  type: string
  group: search
  description: Elasticsearch password.
  secret: true
ES_PREFIX:
  type: string
  group: search
  description: Prefix applied to all Elasticsearch index names. Useful when sharing
    a cluster across multiple instances.
ES_CA_FILE:
  type: string
  group: search
  description: Path to a CA certificate bundle used to verify the Elasticsearch TLS
    connection.
ES_PRESET:
  type: string
  group: search
  description: Elasticsearch deployment preset. Use "single_node_cluster" when running
    a single-node cluster to avoid yellow health status.
  enum:
  - single_node_cluster
OMNIAUTH_ONLY:
  type: boolean
  group: authentication
  description: Disallow password-based logins; require an external auth provider.
  default: false
ONE_CLICK_SSO_LOGIN:
  type: boolean
  group: authentication
  description: Redirect unauthenticated users directly to the single configured OmniAuth
    provider instead of showing the sign-in form.
  default: false
ALLOW_UNSAFE_AUTH_PROVIDER_REATTACH:
  type: boolean
  group: authentication
  description: Allow linking a new external auth identity to an existing account even
    when the e-mail does not match. Potentially dangerous.
  default: false
SSO_ACCOUNT_SIGN_UP:
  type: string
  group: authentication
  description: URL of an external sign-up page shown to users whose SSO account does
    not yet exist in Mastodon.
  format: uri
SSO_ACCOUNT_SETTINGS:
  type: string
  group: authentication
  description: URL of an external account-settings page linked to in the Mastodon
    UI when SSO is active.
  format: uri
LDAP_ENABLED:
  type: boolean
  group: authentication
  description: Enable LDAP authentication.
  default: false
LDAP_HOST:
  type: string
  group: authentication
  description: LDAP server hostname.
  default: localhost
LDAP_PORT:
  type: integer
  group: authentication
  description: LDAP server port.
  default: 389
  minimum: 1
  maximum: 65535
LDAP_METHOD:
  type: string
  group: authentication
  description: Transport security for the LDAP connection.
  default: simple_tls
  enum:
  - simple_tls
  - start_tls
  - plain
LDAP_BASE:
  type: string
  group: authentication
  description: LDAP search base DN.
  examples:
  - dc=example,dc=com
LDAP_BIND_DN:
  type: string
  group: authentication
  description: DN used to bind to the LDAP directory.
LDAP_PASSWORD:
  type: string
  group: authentication
  description: Password for the LDAP bind DN.
  secret: true
LDAP_UID:
  type: string
  group: authentication
  description: LDAP attribute used as the unique login identifier.
  default: cn
LDAP_MAIL:
  type: string
  group: authentication
  description: LDAP attribute containing the user's e-mail address.
  default: mail
LDAP_SEARCH_FILTER:
  type: string
  group: authentication
  description: LDAP search filter. The placeholders %<uid>s, %<mail>s, and %<email>s
    are substituted at runtime.
LDAP_TLS_NO_VERIFY:
  type: boolean
  group: authentication
  description: Skip TLS certificate verification when connecting to the LDAP server.
  default: false
LDAP_UID_CONVERSION_ENABLED:
  type: boolean
  group: authentication
  description: Convert special characters in LDAP UIDs to underscores for Mastodon
    usernames.
  default: false
