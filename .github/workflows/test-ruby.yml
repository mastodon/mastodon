name: Ruby Testing

# ==============================================================================
# CI 路径过滤策略说明
# ==============================================================================
#
# 本 workflow 只在后端/配置变更时运行，纯前端改动会跳过。
#
# === 重要：不使用扩展名模式 ===
#
# 为了防止误跳过后端代码（如 streaming 服务、Node.js 工具等），
# 本配置不使用 `**/*.ts`、`**/*.js` 这类扩展名模式。
#
# 取而代之的是：明确列出可以安全忽略的纯前端目录。
#
# 触发条件：
# - merge_group: 始终运行（合并队列全量测试）
# - push: 始终运行（main/stable-* 分支全量测试）
# - pull_request: 仅当变更不匹配 paths-ignore 时运行
#
# === paths-ignore 规则（纯前端改动跳过）===
#
# 以下规则使用明确的目录路径，而非扩展名模式：
# - app/javascript/**/*    - 纯前端 React/TypeScript 代码目录
# - config/vite/**/*       - Vite 构建插件配置
# - .storybook/**/*        - Storybook 配置
# - .husky/**/*            - Git hooks 配置
# - 前端配置文件            - package.json, yarn.lock, .nvmrc 等
# - 文档文件                - *.md, docs/**/* 等
#
# === 关键：不会误跳过的场景 ===
#
# 以下变更始终触发全量测试（不会被跳过）：
# - 任何不在上述目录中的 JS/TS 文件（如后端服务、streaming 等）
# - 任何 Ruby 文件变更
# - 任何视图模板变更
# - 配置文件变更（config/**/*, db/**/*, lib/**/*）
# - 后端代码变更（app/controllers, app/models, app/lib 等）
# - 本 workflow 文件自身变更
# - 同时包含前后端变更的 PR
# ==============================================================================

on:
  merge_group:
  push:
    branches:
      - 'main'
      - 'stable-*'
  pull_request:
    # --------------------------------------------------------------------------
    # pull_request 事件的 paths-ignore 配置
    # 仅当所有变更文件都匹配以下模式时，跳过此 workflow
    #
    # === 安全设计原则 ===
    #
    # 1. 优先使用明确的目录路径，而非扩展名模式
    # 2. 不使用 `**/*.ts`、`**/*.js` 这类可能误匹配的模式
    # 3. 只有 `app/javascript/**/*` 被认为是"纯前端代码"
    # 4. 任何其他目录中的 JS/TS 文件都会触发全量测试
    #
    # 这是防止"误跳过"的核心设计！
    # --------------------------------------------------------------------------
    paths-ignore:
      # ======================================================================
      # 纯前端代码目录（核心规则）
      # ======================================================================
      #
      # 所有 React/TypeScript 前端代码都在这个目录下。
      # 这个规则已经覆盖了该目录下的所有文件：
      # - *.ts, *.tsx, *.js, *.jsx
      # - *.css, *.scss, *.sass
      # - *.snap
      #
      # 不使用 `**/*.ts` 等扩展名模式，防止误跳过后端代码。
      # ----------------------------------------------------------------------
      - 'app/javascript/**/*'

      # ======================================================================
      # 前端构建工具配置
      # ======================================================================
      #
      # Vite 构建插件和配置。这些是前端构建相关的，不影响后端逻辑。
      # ----------------------------------------------------------------------
      - 'config/vite/**/*'
      - 'vite.config.ts'

      # ======================================================================
      # 开发工具配置
      # ======================================================================
      #
      # Storybook 组件文档工具、Husky Git hooks。
      # 这些不影响代码逻辑。
      # ----------------------------------------------------------------------
      - '.storybook/**/*'
      - '.husky/**/*'

      # ======================================================================
      # 前端配置文件
      # ======================================================================
      #
      # 这些是明确的文件路径，不会误匹配其他文件。
      # ----------------------------------------------------------------------
      - 'package.json'
      - 'yarn.lock'
      - '.nvmrc'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - 'jsconfig.json'
      - '.browserslistrc'

      # ======================================================================
      # 文档文件（不影响代码逻辑）
      # ======================================================================
      #
      # 文档变更不需要运行后端测试。
      # ----------------------------------------------------------------------
      - '*.md'
      - 'docs/**/*'
      - 'AUTHORS'
      - 'CHANGELOG.md'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - 'README.md'
      - 'SECURITY.md'

    # --------------------------------------------------------------------------
    # === 为什么不使用扩展名模式？===
    #
    # ❌ 不推荐的做法：
    #   - '**/*.js'
    #   - '**/*.ts'
    #   - '**/*.tsx'
    #   - '**/*.css'
    #
    # 风险：这些模式会匹配所有目录中的文件，包括：
    # - streaming 服务代码
    # - 后端 Node.js 工具
    # - 其他非前端 JS/TS 代码
    #
    # ✅ 推荐的做法：
    #   - 'app/javascript/**/*'
    #
    # 优势：
    # 1. 只匹配明确的前端目录
    # 2. 不会误跳过任何后端代码
    # 3. 任何新增的后端 JS/TS 文件都会触发测试
    #
    # 这是本配置"零误跳过"的关键防护机制！
    # --------------------------------------------------------------------------

env:
  BUNDLE_CLEAN: true
  BUNDLE_FROZEN: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ==============================================================================
# Job 说明
# ==============================================================================
#
# build:           编译 assets（production 和 test 两种模式）
# test:            Rails 单元测试（多 Ruby 版本矩阵）
# test-e2e:        端到端测试（Playwright）
# test-search:     Elasticsearch/OpenSearch 集成测试
#
# 注意：如果 workflow 被 paths-ignore 跳过，所有 jobs 都不会运行
# ==============================================================================

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        mode:
          - production
          - test
    env:
      RAILS_ENV: ${{ matrix.mode }}
      BUNDLE_WITH: ${{ matrix.mode }}
      SECRET_KEY_BASE_DUMMY: 1

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Ruby environment
        uses: ./.github/actions/setup-ruby

      - name: Set up Javascript environment
        uses: ./.github/actions/setup-javascript
        with:
          onlyProduction: 'true'

      - name: Cache assets from compilation
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            public/assets
            public/packs
            public/packs-test
            tmp/cache/vite
          key: ${{ matrix.mode }}-assets-${{ github.head_ref || github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ matrix.mode }}-assets-${{ github.head_ref || github.ref_name }}-${{ github.sha }}
            ${{ matrix.mode }}-assets-${{ github.head_ref || github.ref_name }}
            ${{ matrix.mode }}-assets-main
            ${{ matrix.mode }}-assets

      - name: Precompile assets
        run: |-
          bin/rails assets:precompile

      - name: Archive asset artifacts
        run: |
          tar --exclude={"*.br","*.gz"} -zcf artifacts.tar.gz public/assets public/packs* tmp/cache/vite/last-build*.json

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: matrix.mode == 'test'
        with:
          path: |-
            ./artifacts.tar.gz
          name: ${{ github.sha }}
          retention-days: 0

  test:
    runs-on: ubuntu-latest

    needs:
      - build

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10ms
          --health-timeout 3s
          --health-retries 50
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10ms
          --health-timeout 3s
          --health-retries 50
        ports:
          - 6379:6379

    env:
      DB_HOST: localhost
      DB_USER: postgres
      DB_PASS: postgres
      COVERAGE: ${{ matrix.ruby-version == '.ruby-version' }}
      RAILS_ENV: test
      ALLOW_NOPAM: true
      PAM_ENABLED: true
      PAM_DEFAULT_SERVICE: pam_test
      PAM_CONTROLLED_SERVICE: pam_test_controlled
      OIDC_ENABLED: true
      OIDC_SCOPE: read
      SAML_ENABLED: true
      CAS_ENABLED: true
      BUNDLE_WITH: 'pam_authentication test'
      GITHUB_RSPEC: ${{ matrix.ruby-version == '.ruby-version' && github.event.pull_request && 'true' }}

    strategy:
      fail-fast: false
      matrix:
        ruby-version:
          - '3.3'
          - '3.4'
          - '.ruby-version'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: './'
          name: ${{ github.sha }}

      - name: Expand archived asset artifacts
        run: |
          tar xvzf artifacts.tar.gz

      - name: Set up Ruby environment
        uses: ./.github/actions/setup-ruby
        with:
          ruby-version: ${{ matrix.ruby-version}}
          additional-system-dependencies: ffmpeg libpam-dev

      - name: Load database schema
        run: |
          bin/rails db:setup
          bin/flatware fan bin/rails db:test:prepare

      - name: Cache RSpec persistence file
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            tmp/rspec/examples.txt
          key: rspec-persistence-${{ github.head_ref || github.ref_name }}-${{ github.sha }}
          restore-keys: |
            rspec-persistence-${{ github.head_ref || github.ref_name }}-${{ github.sha }}-${{ matrix.ruby-version }}
            rspec-persistence-${{ github.head_ref || github.ref_name }}-${{ github.sha }}
            rspec-persistence-${{ github.head_ref || github.ref_name }}
            rspec-persistence-main
            rspec-persistence

      - run: bin/flatware rspec -r ./spec/flatware_helper.rb

      - name: Upload coverage reports to Codecov
        if: matrix.ruby-version == '.ruby-version'
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: coverage/lcov/*.lcov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-e2e:
    name: End to End testing
    runs-on: ubuntu-latest

    needs:
      - build

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10ms
          --health-timeout 3s
          --health-retries 50
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10ms
          --health-timeout 3s
          --health-retries 50
        ports:
          - 6379:6379

    env:
      DB_HOST: localhost
      DB_USER: postgres
      DB_PASS: postgres
      RAILS_ENV: test
      BUNDLE_WITH: test
      LOCAL_DOMAIN: localhost:3000
      LOCAL_HTTPS: false

    strategy:
      fail-fast: false
      matrix:
        ruby-version:
          - '3.3'
          - '3.4'
          - '.ruby-version'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: './'
          name: ${{ github.sha }}

      - name: Expand archived asset artifacts
        run: |
          tar xvzf artifacts.tar.gz

      - name: Set up Ruby environment
        uses: ./.github/actions/setup-ruby
        with:
          ruby-version: ${{ matrix.ruby-version}}
          additional-system-dependencies: ffmpeg

      - name: Set up Javascript environment
        uses: ./.github/actions/setup-javascript

      - name: Load database schema
        run: './bin/rails db:create db:schema:load db:seed'

      - name: Cache Playwright Chromium browser
        id: playwright-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

      - name: Install Playwright Chromium browser (with deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: yarn run playwright install --with-deps chromium

      - name: Install Playwright Chromium browser deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: yarn run playwright install-deps chromium

      - run: bin/rspec spec/system --tag streaming --tag js

      - name: Archive logs
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: failure()
        with:
          name: e2e-logs-${{ matrix.ruby-version }}
          path: log/

      - name: Archive test screenshots
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: failure()
        with:
          name: e2e-screenshots-${{ matrix.ruby-version }}
          path: tmp/capybara/

  test-search:
    name: Elastic Search integration testing
    runs-on: ubuntu-latest

    needs:
      - build

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10ms
          --health-timeout 3s
          --health-retries 50
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10ms
          --health-timeout 3s
          --health-retries 50
        ports:
          - 6379:6379

      elasticsearch:
        image: ${{ contains(matrix.search-image, 'elasticsearch') && matrix.search-image || '' }}
        env:
          discovery.type: single-node
          xpack.security.enabled: false
        options: >-
          --health-cmd "curl http://localhost:9200/_cluster/health"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 50
        ports:
          - 9200:9200

      opensearch:
        image: ${{ contains(matrix.search-image, 'opensearch') && matrix.search-image || '' }}
        env:
          discovery.type: single-node
          DISABLE_INSTALL_DEMO_CONFIG: true
          DISABLE_SECURITY_PLUGIN: true
        options: >-
          --health-cmd "curl http://localhost:9200/_cluster/health"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 50
        ports:
          - 9200:9200

    env:
      DB_HOST: localhost
      DB_USER: postgres
      DB_PASS: postgres
      RAILS_ENV: test
      BUNDLE_WITH: test
      ES_ENABLED: true
      ES_HOST: localhost
      ES_PORT: 9200

    strategy:
      fail-fast: false
      matrix:
        ruby-version:
          - '3.3'
          - '3.4'
          - '.ruby-version'
        search-image:
          - docker.elastic.co/elasticsearch/elasticsearch:7.17.29
        include:
          - ruby-version: '.ruby-version'
            search-image: docker.elastic.co/elasticsearch/elasticsearch:8.19.2
          - ruby-version: '.ruby-version'
            search-image: opensearchproject/opensearch:2

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: './'
          name: ${{ github.sha }}

      - name: Expand archived asset artifacts
        run: |
          tar xvzf artifacts.tar.gz

      - name: Set up Ruby environment
        uses: ./.github/actions/setup-ruby
        with:
          ruby-version: ${{ matrix.ruby-version}}
          additional-system-dependencies: ffmpeg

      - name: Set up Javascript environment
        uses: ./.github/actions/setup-javascript

      - name: Load database schema
        run: './bin/rails db:create db:schema:load db:seed'

      - run: bin/rspec --tag search

      - name: Archive logs
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: failure()
        with:
          name: test-search-logs-${{ matrix.ruby-version }}
          path: log/
