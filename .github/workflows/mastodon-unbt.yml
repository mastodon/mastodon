name: Mastodon Autobuild

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# ---- Explicit permissions for build + deploy ----
permissions:
  contents: read            # for actions/checkout
  pages: write              # for Pages deployment
  id-token: write           # for OIDC authentication used by Pages/other deployments

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mastodon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:6
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_NAME: mastodon_test
      DB_PASS: postgres
      REDIS_URL: redis://localhost:6379/1
      NODE_OPTIONS: --max_old_space_size=4096

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libpq-dev libxml2-dev libxslt1-dev file imagemagick libvips libprotobuf-dev protobuf-compiler pkg-config

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Yarn
        run: |
          npm install -g yarn@4
          yarn --version

      - name: Install JS dependencies
        run: yarn install --immutable

      - name: Install Ruby dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Prepare database
        run: |
          cp .env.production.sample .env.test
          export RAILS_ENV=test
          bundle exec rails db:setup

      - name: Build Mastodon assets
        run: bundle exec rails assets:precompile

      - name: Run Mastodon test suite (optional)
        run: bundle exec rails test

      # -------------------------------
      # If you want to deploy docs/static to GitHub Pages, uncomment the lines below
      # Note: For "pages" deployment to work, your static site output (HTML, etc.) must be in './docs' or change the publish_dir below.
