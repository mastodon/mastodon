name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy-docs:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # No build needed if /docs is already Markdown/HTML
      # If adding a generator (e.g., Docusaurus), uncomment Node, install, build steps

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./docs    # /docs includes ENVIRONMENT.md and DEVELOPMENT.md

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
