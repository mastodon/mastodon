name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy-docs:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Ensure /docs exists and create .nojekyll
        run: |
          if [ ! -d "./docs" ]; then
            echo "❌ ERROR: ./docs directory does not exist. Aborting deploy."
            exit 1
          fi
          touch ./docs/.nojekyll
          echo ".nojekyll file created in ./docs"

      # If you need to build docs (e.g., from Markdown to HTML), insert steps here

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload docs directory as artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
